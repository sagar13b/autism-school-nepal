<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Page Not Found - Siddhartha Autism Care Center</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap"
        rel="stylesheet" />

    <style>
        :root {
            --bg-page: #f0f7f4;
            --text-primary: #1a2e26;
            --text-secondary: #3d5a50;
            --accent-teal: #2a9d8f;
            --accent-blue: #4a90c4;
            --font-heading: 'Lora', Georgia, serif;
            --font-body: 'Nunito', 'Segoe UI', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background: linear-gradient(135deg, #f0f7f4 0%, #ddeef6 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 1rem;
        }

        .error-container {
            text-align: center;
            max-width: 600px;
        }

        .error-code {
            font-family: var(--font-heading);
            font-size: clamp(5rem, 15vw, 10rem);
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-teal), var(--accent-blue));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin: 0;
        }

        .error-emoji {
            font-size: clamp(3rem, 8vw, 5rem);
            margin: 1rem 0;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: var(--text-primary);
            margin: 1rem 0;
        }

        p {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            color: var(--text-secondary);
            margin: 1.5rem 0;
            line-height: 1.7;
        }

        .btn-home {
            display: inline-block;
            background: var(--accent-teal);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            padding: 0.9rem 2rem;
            border-radius: 10px;
            text-decoration: none;
            margin-top: 1.5rem;
            transition: opacity 0.2s, transform 0.2s;
        }

        .btn-home:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .suggestions {
            margin-top: 2.5rem;
            padding-top: 2rem;
            border-top: 2px solid rgba(42, 157, 143, 0.2);
        }

        .suggestions h2 {
            font-family: var(--font-heading);
            font-size: 1.2rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .suggestion-links {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
        }

        .suggestion-links a {
            color: var(--accent-teal);
            text-decoration: none;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border: 2px solid var(--accent-teal);
            border-radius: 8px;
            transition: background 0.2s, color 0.2s;
        }

        .suggestion-links a:hover {
            background: var(--accent-teal);
            color: white;
        }
    </style>
</head>

<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-emoji" aria-hidden="true">🌸</div>
        <h1>Page Not Found</h1>
        <p>
            We're sorry, but the page you're looking for doesn't exist or has been moved.
            Every child's journey is unique, and sometimes paths lead to unexpected places.
        </p>
        <a href="index.html" class="btn-home">Return to Home</a>

        <div class="suggestions">
            <h2>Explore Our Website</h2>
            <div class="suggestion-links">
                <a href="index.html#about">About Us</a>
                <a href="index.html#programs">Our Programs</a>
                <a href="index.html#contact">Contact</a>
            </div>
        </div>
    </div>
</body>

</html>
